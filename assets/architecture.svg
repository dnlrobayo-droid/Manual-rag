<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f0b429"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="url(#bg)"/>
  <text x="500" y="40" font-size="24" font-weight="700" text-anchor="middle" fill="#f0b429">Manual RAG — Arquitectura del sistema</text>

  <!-- INGESTION PIPELINE -->
  <g>
    <text x="180" y="85" font-size="14" font-weight="700" fill="#58a6ff">PIPELINE DE INGESTIÓN (offline)</text>

    <rect x="60" y="100" width="220" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <text x="170" y="125" font-size="13" font-weight="700" text-anchor="middle" fill="#e6edf3">📄 PDFs / TXT</text>
    <text x="170" y="145" font-size="11" text-anchor="middle" fill="#8b949e">data/manuals/</text>

    <rect x="60" y="190" width="220" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <text x="170" y="215" font-size="13" font-weight="700" text-anchor="middle" fill="#e6edf3">🔪 Chunking jerárquico</text>
    <text x="170" y="235" font-size="11" text-anchor="middle" fill="#8b949e">LangChain · 500 tok / 50 overlap</text>

    <rect x="60" y="280" width="220" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <text x="170" y="305" font-size="13" font-weight="700" text-anchor="middle" fill="#e6edf3">🧠 Embeddings locales</text>
    <text x="170" y="325" font-size="11" text-anchor="middle" fill="#8b949e">all-MiniLM-L6-v2 (384d)</text>

    <rect x="60" y="370" width="220" height="60" rx="8" fill="#161b22" stroke="#f0b429" stroke-width="2"/>
    <text x="170" y="395" font-size="13" font-weight="700" text-anchor="middle" fill="#f0b429">💾 ChromaDB persistente</text>
    <text x="170" y="415" font-size="11" text-anchor="middle" fill="#8b949e">./chroma_db/</text>

    <line x1="170" y1="160" x2="170" y2="190" stroke="#f0b429" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="170" y1="250" x2="170" y2="280" stroke="#f0b429" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="170" y1="340" x2="170" y2="370" stroke="#f0b429" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- QUERY PIPELINE -->
  <g>
    <text x="730" y="85" font-size="14" font-weight="700" fill="#58a6ff">PIPELINE DE CONSULTA (online)</text>

    <rect x="600" y="100" width="260" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <text x="730" y="125" font-size="13" font-weight="700" text-anchor="middle" fill="#e6edf3">👷 Técnico en campo</text>
    <text x="730" y="145" font-size="11" text-anchor="middle" fill="#8b949e">Streamlit UI · Modo: consulta / proc. / error</text>

    <rect x="600" y="190" width="260" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <text x="730" y="215" font-size="13" font-weight="700" text-anchor="middle" fill="#e6edf3">🔍 Embedding de la consulta</text>
    <text x="730" y="235" font-size="11" text-anchor="middle" fill="#8b949e">SentenceTransformer</text>

    <rect x="600" y="280" width="260" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <text x="730" y="305" font-size="13" font-weight="700" text-anchor="middle" fill="#e6edf3">🎯 Top-K chunks (cosine)</text>
    <text x="730" y="325" font-size="11" text-anchor="middle" fill="#8b949e">k = 4 (configurable)</text>

    <rect x="600" y="370" width="260" height="60" rx="8" fill="#161b22" stroke="#f0b429" stroke-width="2"/>
    <text x="730" y="395" font-size="13" font-weight="700" text-anchor="middle" fill="#f0b429">🤖 Claude 3 Haiku</text>
    <text x="730" y="415" font-size="11" text-anchor="middle" fill="#8b949e">system prompt técnico + contexto</text>

    <rect x="600" y="460" width="260" height="60" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
    <text x="730" y="485" font-size="13" font-weight="700" text-anchor="middle" fill="#3fb950">✅ Respuesta estructurada</text>
    <text x="730" y="505" font-size="11" text-anchor="middle" fill="#8b949e">Problema · Causas · Procedimiento · Seguridad</text>

    <line x1="730" y1="160" x2="730" y2="190" stroke="#f0b429" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="730" y1="250" x2="730" y2="280" stroke="#f0b429" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="730" y1="340" x2="730" y2="370" stroke="#f0b429" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="730" y1="430" x2="730" y2="460" stroke="#f0b429" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- BRIDGE: ChromaDB -> top-k -->
  <path d="M 280 400 Q 450 400 450 310 L 600 310" stroke="#f0b429" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="440" y="365" font-size="11" text-anchor="middle" fill="#f0b429">similarity search</text>

  <!-- Footer -->
  <text x="500" y="570" font-size="11" text-anchor="middle" fill="#8b949e">Manual RAG v1.0 · ChromaDB + SentenceTransformer + Anthropic Claude</text>
</svg>
